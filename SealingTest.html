<script>
    // --- REPLACE THIS WITH YOUR DEPLOYED GOOGLE WEB APP URL ---
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZ3gxZkSFN8-FpWLSFR39PzajsORliKLLXQFEYQOdbUutu8XgaX49LHu82c-bHf762Uw/exec";
    
    const MAX_SIDE_LENGTH = 1000;
    const THUMBNAIL_SIZE = 60;
    const textInputs = ['q2','q3', 'q5', 'q5','o9'];
    const photoWrapper = document.getElementById('photoSectionWrapper');

    // --- SESSION ROUTER ENGINE ---
    document.addEventListener("DOMContentLoaded", () => {
        const storedName = localStorage.getItem('user_name');
        const storedBadge = localStorage.getItem('user_badge');
        
        if (storedName && storedBadge) {
            // User is logged in, prefill values and show form layout
            document.getElementById('q4').value = storedName;
            //document.getElementById('q2').value = storedBadge;
            document.getElementById('loginView').style.display = "none";
            document.getElementById('formView').style.display = "block";
            checkTextQuestions();
       
        } else {
            // User is not logged in, drop down to login layout
            document.getElementById('formView').style.display = "none";
            document.getElementById('loginView').style.display = "block";
        }
    });

    // --- VIEW 1: LOGIN LOGIC ---
    async function handleLogin(event) {
        event.preventDefault();
        const badge = document.getElementById('badgeInput').value.trim();
        const password = document.getElementById('passwordInput').value;
        const errorMsg = document.getElementById('errorMsg');
        const loginBtn = document.getElementById('loginBtn');

        errorMsg.textContent = "";
        loginBtn.disabled = true;
        loginBtn.textContent = "Verifying...";

        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "loginVerify", badge: badge, password: password })
            });
            const result = await response.json();

            if (result.status === "success") {
                localStorage.setItem('user_badge', result.badge);
                localStorage.setItem('user_name', result.name);
                
                // Prefill details and instantly toggle views without full page reloads
                document.getElementById('q4').value = result.name;
                //document.getElementById('q2').value = result.badge;
                document.getElementById('loginView').style.display = "none";
                document.getElementById('formView').style.display = "block";
                checkTextQuestions();
                     location.reload()
            } else {
                errorMsg.textContent = result.message || "Invalid Credentials.";
                loginBtn.disabled = false;
                loginBtn.textContent = "Login";
            }
        } catch (e) {
            errorMsg.textContent = "Connection issue. Try again.";
            loginBtn.disabled = false;
            loginBtn.textContent = "Login";
        }
    }

    function handleLogout() {
        localStorage.removeItem('user_badge');
        localStorage.removeItem('user_name');
        localStorage.removeItem('submission_row_id');
        document.getElementById('mainForm').reset();
        document.getElementById('loginForm').reset();
        document.getElementById('formView').style.display = "none";
        document.getElementById('loginView').style.display = "block";
    }

    // --- VIEW 2: FORM LOGIC ---
    // Generate Photo Questions (6 to 26) dynamically
   //const photoContainer = document.getElementById('photoQuestionsContainer');
   //for (let i = 6; i <= 26; i++) {

   //    `;
   //    photoContainer.appendChild(group);

    function checkTextQuestions() {
        const allFilled = ['q1', 'q2', 'q3', 'q4', 'q5','o9'].every(id => document.getElementById(id).value.trim() !== "");
        photoWrapper.style.display = allFilled ? "block" : "none";
    }

    textInputs.forEach(id => {
        document.getElementById(id).addEventListener('input', checkTextQuestions);
    });

    async function processAndUpload(input, questionNum) {
        const file = input.files[0];
        if (!file) return;

        const statusEl = document.getElementById(`status-q${questionNum}`);
        const previewEl = document.getElementById(`preview-q${questionNum}`);
        statusEl.textContent = "Compressing...";
        statusEl.className = "status-msg status-loading";

        try {
            const img = await readImage(file);
            const mediumBase64 = compressImage(img, MAX_SIDE_LENGTH);
            const thumbnailBase64 = compressImage(img, THUMBNAIL_SIZE);
            previewEl.innerHTML = `<img src="${thumbnailBase64}" alt="preview">`;

            statusEl.textContent = "Uploading in background...";
            let rowId = localStorage.getItem('submission_row_id') || "";
            
            let payload = {
                questionNum: questionNum,
                rowId: rowId,
                imageData: mediumBase64,
                fileName: file.name
            };

            if (questionNum === 6 && !rowId) {
                payload.q1 = document.getElementById('q1').value;
                payload.q2 = document.getElementById('q2').value;
                payload.q3 = document.getElementById('q3').value;
                payload.q4 = document.getElementById('q4').value;
                payload.q5 = document.getElementById('q5').value;
            }

            const response = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await response.json();

            if (result.status === "success") {
                statusEl.textContent = "✓ Uploaded successfully";
                statusEl.className = "status-msg status-success";
                if (result.rowId && !rowId) {
                    localStorage.setItem('submission_row_id', result.rowId);
                }
            } else { throw new Error(result.message); }
        } catch (error) {
            statusEl.textContent = "❌ Upload failed.";
            statusEl.className = "status-msg";
        }
    }

    function readImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    function compressImage(img, maxSide) {
        const canvas = document.createElement('canvas');
        let width = img.width, height = img.height;
        if (width > height) { if (width > maxSide) { height *= maxSide / width; width = maxSide; } }
        else { if (height > maxSide) { width *= maxSide / height; height = maxSide; } }
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        return canvas.toDataURL('image/jpeg', 0.85); 
    }
